  notes: ""

- term: "actor isolation"
  type: concept
  definition: |
    Swift's compile-time guarantee that an actor's mutable state is only
    accessed from inside that actor. External callers must use await to
    cross the isolation boundary.
  first_encountered:
    source_file: "Sources/Managers/CloudSyncManager.swift:127"
    context: "Day 12 tutorial"
    date: "2026-04-21"
  status: confused
  test_history:
    - { date: "2026-04-22", result: partial, source: "Day 12 post-test" }
    - { date: "2026-04-29", result: wrong, source: "vocab review" }
    - { date: "2026-05-04", result: partial, source: "vocab review" }
  applied_test_history: []
  related_terms: ["actor", "@MainActor", "nonisolated", "Sendable"]
  notes: |
    Keep confusing this with @MainActor. They're related but not the same:
    @MainActor is one specific actor (the main one); actor isolation is the
    general property that any actor enforces.

- term: "consume"
  type: swift-keyword
  definition: |
    Ownership keyword (Swift 5.9+) that explicitly transfers ownership of a
    value to a function, ending the caller's access to it. Used for non-copyable
    types and to optimize move semantics for large values.
  first_encountered:
    source_file: ""
    context: "vocab add"
    date: "2026-05-09"
  status: new
  test_history: []
  applied_test_history: []
  related_terms: ["ownership", "borrow", "copy", "non-copyable"]
  notes: "Added via vocab add — encountered in a code review, no source file yet."

- term: "ViewThatFits"
  type: swift-attribute
  definition: |
    SwiftUI container (iOS 16+) that picks the first child that fits the
    available space. Useful for adaptive layouts that gracefully degrade
    on smaller screens or larger Dynamic Type sizes.
  first_encountered:
